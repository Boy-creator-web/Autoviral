services:
  backend:
    build:
      context: ./backend
    container_name: autoviral-backend
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Autoviral Backend}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+psycopg2://autoviral:autoviral@postgres:5432/autoviral}
      SECRET_KEY: ${BACKEND_SECRET_KEY:-change-this-secret}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: autoviral-postgres
    environment:
      POSTGRES_DB: autoviral
      POSTGRES_USER: autoviral
      POSTGRES_PASSWORD: autoviral
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoviral -d autoviral"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: autoviral-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postiz:
    profiles: ["postiz"]
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    environment:
      MAIN_URL: ${POSTIZ_MAIN_URL:-http://localhost:4007}
      FRONTEND_URL: ${POSTIZ_FRONTEND_URL:-http://localhost:4007}
      NEXT_PUBLIC_BACKEND_URL: ${POSTIZ_BACKEND_PUBLIC_URL:-http://localhost:4007/api}
      JWT_SECRET: ${POSTIZ_JWT_SECRET:-change-me-postiz-jwt-secret}
      DATABASE_URL: postgresql://postiz-user:postiz-password@postiz-postgres:5432/postiz-db-local
      REDIS_URL: redis://postiz-redis:6379
      BACKEND_INTERNAL_URL: http://localhost:3000
      TEMPORAL_ADDRESS: temporal:7233
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: ${POSTIZ_DISABLE_REGISTRATION:-false}
      RUN_CRON: "true"
      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads
    volumes:
      - postiz_config:/config
      - postiz_uploads:/uploads
    ports:
      - "4007:5000"
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started

  postiz-postgres:
    profiles: ["postiz"]
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postiz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db-local"]
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    profiles: ["postiz"]
    image: redis:7-alpine
    container_name: postiz-redis
    restart: unless-stopped
    volumes:
      - postiz_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  temporal-postgresql:
    profiles: ["postiz"]
    container_name: temporal-postgresql
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data

  temporal-elasticsearch:
    profiles: ["postiz"]
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: "false"
    volumes:
      - temporal_elasticsearch_data:/usr/share/elasticsearch/data

  temporal:
    profiles: ["postiz"]
    container_name: temporal
    image: temporalio/auto-setup:1.28.1
    restart: unless-stopped
    ports:
      - "7233:7233"
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      ENABLE_ES: "true"
      ES_SEEDS: temporal-elasticsearch
      ES_VERSION: v7
      TEMPORAL_NAMESPACE: default

  temporal-admin-tools:
    profiles: ["postiz"]
    container_name: temporal-admin-tools
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    depends_on:
      - temporal

  temporal-ui:
    profiles: ["postiz"]
    container_name: temporal-ui
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

volumes:
  postgres_data:
  redis_data:
  postiz_config:
  postiz_uploads:
  postiz_postgres_data:
  postiz_redis_data:
  temporal_postgres_data:
  temporal_elasticsearch_data:
